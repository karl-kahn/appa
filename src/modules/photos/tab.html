<div class="appa-photos-tab">
  <header class="appa-photos-header">
    <h2>Photos</h2>
    <form id="appa-photos-upload" enctype="multipart/form-data">
      <label class="appa-photos-file">
        <span class="sr-only">Choose photos to upload</span>
        <input type="file" name="photos" multiple accept="image/*" required>
      </label>
      <label class="appa-photos-alt">
        <span>Alt text (what's in the photo, for screen readers):</span>
        <input type="text" name="alt" placeholder="e.g., wind turbine on the test stand" maxlength="300">
      </label>
      <button type="submit">Upload</button>
    </form>
  </header>
  <ul class="appa-photos-gallery" id="appa-photos-gallery" aria-live="polite" aria-label="Uploaded photos"></ul>
</div>
<style>
  .appa-photos-tab { padding: 1rem; }
  .appa-photos-header { display:flex; flex-direction:column; gap: 0.5rem; margin-bottom: 1rem; }
  .appa-photos-header form { display:flex; gap: 0.6rem; flex-wrap: wrap; align-items: flex-end; }
  .appa-photos-alt { display:flex; flex-direction:column; gap: 0.2rem; flex: 1; min-width: 220px; }
  .appa-photos-alt span { font-size: 0.8rem; color: var(--muted); }
  .appa-photos-alt input { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 0.4rem 0.5rem; border-radius: 4px; font: inherit; }
  .sr-only { position:absolute; left:-9999px; }
  .appa-photos-gallery { list-style:none; padding:0; margin:0; display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
  .appa-photos-gallery li { margin:0; background:var(--panel); border:1px solid var(--border); padding:0.4rem; border-radius:4px; }
  .appa-photos-gallery img { width:100%; height:140px; object-fit:cover; border-radius:3px; }
  .appa-photos-gallery .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
</style>
<script type="module">
  const root = document.currentScript.parentElement;
  const form = root.querySelector("#appa-photos-upload");
  const gallery = root.querySelector("#appa-photos-gallery");
  async function refresh() {
    const headers = window.appaCurrentUserId ? { "X-Appa-User": window.appaCurrentUserId } : {};
    const { photos } = await fetch("/api/photos", { headers }).then((r) => r.json());
    gallery.innerHTML = "";
    for (const p of photos) {
      const li = document.createElement("li");
      li.innerHTML = `<img loading="lazy"/><div class="meta"></div>`;
      const img = li.querySelector("img");
      img.src = `/api/photos/file/${encodeURIComponent(p.filename)}`;
      img.alt = p.alt || p.originalName || "uploaded photo";
      li.querySelector(".meta").textContent =
        `${p.uploaderName} · ${new Date(p.uploadedAt).toLocaleString()}`;
      gallery.appendChild(li);
    }
  }
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const uid = window.appaCurrentUserId ?? "";
    const headers = uid ? { "X-Appa-User": uid } : undefined;
    await fetch("/api/photos/upload", { method: "POST", body: fd, headers });
    form.reset();
    refresh();
  });
  refresh();
</script>

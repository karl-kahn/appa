<div class="appa-photos-tab">
  <header class="appa-photos-header">
    <h2>Photos</h2>
    <form id="appa-photos-upload" enctype="multipart/form-data">
      <input type="file" name="photos" multiple accept="image/*" required>
      <button type="submit">Upload</button>
    </form>
  </header>
  <div class="appa-photos-gallery" id="appa-photos-gallery"></div>
</div>
<style>
  .appa-photos-tab { padding: 1rem; }
  .appa-photos-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem; }
  .appa-photos-gallery { display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
  .appa-photos-gallery figure { margin:0; background:#222; border:1px solid #333; padding:0.4rem; border-radius:4px; }
  .appa-photos-gallery img { width:100%; height:140px; object-fit:cover; border-radius:3px; }
  .appa-photos-gallery figcaption { font-size: 0.75rem; opacity: 0.7; margin-top: 0.3rem; }
</style>
<script type="module">
  const root = document.currentScript.parentElement;
  const form = root.querySelector("#appa-photos-upload");
  const gallery = root.querySelector("#appa-photos-gallery");
  async function refresh() {
    const { photos } = await fetch("/api/photos").then((r) => r.json());
    gallery.innerHTML = "";
    for (const p of photos) {
      const f = document.createElement("figure");
      f.innerHTML = `<img loading="lazy"/><figcaption></figcaption>`;
      f.querySelector("img").src = `/api/photos/file/${encodeURIComponent(p.filename)}`;
      f.querySelector("figcaption").textContent =
        `${p.uploaderName} · ${new Date(p.uploadedAt).toLocaleString()}`;
      gallery.appendChild(f);
    }
  }
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const uid = window.appaCurrentUserId ?? "";
    if (uid) fd.append("uploaderId", uid);
    await fetch("/api/photos/upload", { method: "POST", body: fd });
    form.reset();
    refresh();
  });
  refresh();
</script>
